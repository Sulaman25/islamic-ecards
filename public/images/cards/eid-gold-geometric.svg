<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#2d1b0e"/>
  <defs>
    <!-- 8-pointed star tile -->
    <pattern id="star8" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Outer 8-pointed star -->
      <polygon points="50,5 61,35 93,35 68,57 79,91 50,70 21,91 32,57 7,35 39,35"
        fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"
        transform="rotate(22.5,50,50)"/>
      <!-- Inner 8-pointed star -->
      <polygon points="50,18 57,36 76,36 62,47 67,66 50,55 33,66 38,47 24,36 43,36"
        fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.4"/>
      <!-- Cross lines -->
      <line x1="50" y1="0" x2="50" y2="100" stroke="#c9a84c" stroke-width="0.3" opacity="0.15"/>
      <line x1="0" y1="50" x2="100" y2="50" stroke="#c9a84c" stroke-width="0.3" opacity="0.15"/>
      <line x1="0" y1="0" x2="100" y2="100" stroke="#c9a84c" stroke-width="0.3" opacity="0.12"/>
      <line x1="100" y1="0" x2="0" y2="100" stroke="#c9a84c" stroke-width="0.3" opacity="0.12"/>
      <!-- Center dot -->
      <circle cx="50" cy="50" r="2" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.35"/>
    </pattern>
    <!-- Secondary offset pattern -->
    <pattern id="star8b" x="50" y="50" width="100" height="100" patternUnits="userSpaceOnUse">
      <polygon points="50,5 61,35 93,35 68,57 79,91 50,70 21,91 32,57 7,35 39,35"
        fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.18"
        transform="rotate(22.5,50,50)"/>
    </pattern>
  </defs>
  <!-- Base tiling -->
  <rect width="600" height="800" fill="url(#star8)"/>
  <rect width="600" height="800" fill="url(#star8b)"/>
  <!-- Large central 8-pointed star -->
  <g transform="translate(300,400)" opacity="0.12">
    <polygon points="0,-160 42,-42 160,0 42,42 0,160 -42,42 -160,0 -42,-42"
      fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <polygon points="0,-120 31,-31 120,0 31,31 0,120 -31,31 -120,0 -31,-31"
      fill="none" stroke="#c9a84c" stroke-width="1.2"/>
    <polygon points="0,-80 21,-21 80,0 21,21 0,80 -21,21 -80,0 -21,-21"
      fill="none" stroke="#c9a84c" stroke-width="1"/>
    <circle cx="0" cy="0" r="180" fill="none" stroke="#c9a84c" stroke-width="0.8" stroke-dasharray="4,8"/>
    <circle cx="0" cy="0" r="240" fill="none" stroke="#c9a84c" stroke-width="0.6" stroke-dasharray="2,10"/>
  </g>
  <!-- Corner accents -->
  <g opacity="0.15">
    <polygon points="0,0 25,0 12.5,22" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="translate(10,10)"/>
    <polygon points="0,0 25,0 12.5,22" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="translate(565,10) scale(-1,1)"/>
    <polygon points="0,0 25,0 12.5,22" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="translate(10,765) scale(1,-1)"/>
    <polygon points="0,0 25,0 12.5,22" fill="none" stroke="#c9a84c" stroke-width="0.8" transform="translate(565,765) scale(-1,-1)"/>
  </g>
  <!-- Horizontal border bands -->
  <rect x="0" y="40" width="600" height="1" fill="#c9a84c" opacity="0.2"/>
  <rect x="0" y="760" width="600" height="1" fill="#c9a84c" opacity="0.2"/>
  <rect x="0" y="44" width="600" height="0.5" fill="#c9a84c" opacity="0.1"/>
  <rect x="0" y="756" width="600" height="0.5" fill="#c9a84c" opacity="0.1"/>
  <!-- Vertical border bands -->
  <rect x="40" y="0" width="1" height="800" fill="#c9a84c" opacity="0.2"/>
  <rect x="559" y="0" width="1" height="800" fill="#c9a84c" opacity="0.2"/>
</svg>
