<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#1a1a0a"/>
  <defs>
    <!-- Diamond / rhombus tiling -->
    <pattern id="diamondTile" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Main diamond -->
      <polygon points="30,2 58,30 30,58 2,30"
        fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.45"/>
      <!-- Inner diamond -->
      <polygon points="30,12 48,30 30,48 12,30"
        fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.3"/>
      <!-- Center tiny diamond -->
      <polygon points="30,23 37,30 30,37 23,30"
        fill="none" stroke="#fbbf24" stroke-width="0.4" opacity="0.22"/>
      <!-- Cross through diamond -->
      <line x1="30" y1="0" x2="30" y2="60" stroke="#fbbf24" stroke-width="0.3" opacity="0.15"/>
      <line x1="0" y1="30" x2="60" y2="30" stroke="#fbbf24" stroke-width="0.3" opacity="0.15"/>
      <!-- Corner dots -->
      <circle cx="30" cy="2" r="1" fill="#fbbf24" opacity="0.3"/>
      <circle cx="58" cy="30" r="1" fill="#fbbf24" opacity="0.3"/>
      <circle cx="30" cy="58" r="1" fill="#fbbf24" opacity="0.3"/>
      <circle cx="2" cy="30" r="1" fill="#fbbf24" opacity="0.3"/>
    </pattern>
    <!-- Offset secondary pattern -->
    <pattern id="diamondTile2" x="30" y="30" width="60" height="60" patternUnits="userSpaceOnUse">
      <polygon points="30,2 58,30 30,58 2,30"
        fill="none" stroke="#fbbf24" stroke-width="0.35" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#diamondTile)"/>
  <rect width="600" height="800" fill="url(#diamondTile2)"/>

  <!-- Central large diamond -->
  <g transform="translate(300,400)" opacity="0.13">
    <polygon points="0,-180 180,0 0,180 -180,0"
      fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <polygon points="0,-130 130,0 0,130 -130,0"
      fill="none" stroke="#fbbf24" stroke-width="1.2"/>
    <polygon points="0,-80 80,0 0,80 -80,0"
      fill="none" stroke="#fbbf24" stroke-width="1"/>
    <polygon points="0,-40 40,0 0,40 -40,0"
      fill="none" stroke="#fbbf24" stroke-width="0.8"/>
    <!-- Diagonal cross -->
    <line x1="-180" y1="0" x2="180" y2="0" stroke="#fbbf24" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="-180" x2="0" y2="180" stroke="#fbbf24" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Decorative zigzag borders top and bottom -->
  <polyline points="0,30 20,10 40,30 60,10 80,30 100,10 120,30 140,10 160,30 180,10 200,30 220,10 240,30 260,10 280,30 300,10 320,30 340,10 360,30 380,10 400,30 420,10 440,30 460,10 480,30 500,10 520,30 540,10 560,30 580,10 600,30"
    fill="none" stroke="#fbbf24" stroke-width="0.6" opacity="0.14"/>
  <polyline points="0,770 20,790 40,770 60,790 80,770 100,790 120,770 140,790 160,770 180,790 200,770 220,790 240,770 260,790 280,770 300,790 320,770 340,790 360,770 380,790 400,770 420,790 440,770 460,790 480,770 500,790 520,770 540,790 560,770 580,790 600,770"
    fill="none" stroke="#fbbf24" stroke-width="0.6" opacity="0.14"/>

  <!-- Side accent lines -->
  <line x1="30" y1="0" x2="30" y2="800" stroke="#fbbf24" stroke-width="0.5" opacity="0.1"/>
  <line x1="570" y1="0" x2="570" y2="800" stroke="#fbbf24" stroke-width="0.5" opacity="0.1"/>
</svg>
