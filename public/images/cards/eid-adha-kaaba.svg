<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#0d1a0d"/>
  <defs>
    <pattern id="squares" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect x="5" y="5" width="50" height="50" fill="none" stroke="#fcd34d" stroke-width="0.4" opacity="0.18"/>
      <rect x="15" y="15" width="30" height="30" fill="none" stroke="#fcd34d" stroke-width="0.3" opacity="0.12"/>
      <circle cx="30" cy="30" r="2" fill="none" stroke="#fcd34d" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#squares)"/>

  <!-- Kaaba - central cube with cloth lines (kiswa) -->
  <g transform="translate(300,400)" opacity="0.16">
    <!-- Cube shape representing Kaaba -->
    <rect x="-60" y="-70" width="120" height="130" fill="none" stroke="#fcd34d" stroke-width="1.5"/>
    <!-- Top face perspective -->
    <polygon points="-60,-70 -90,-95 30,-95 60,-70"
      fill="none" stroke="#fcd34d" stroke-width="1.2"/>
    <!-- Side face perspective -->
    <polygon points="60,-70 30,-95 30,35 60,60"
      fill="none" stroke="#fcd34d" stroke-width="1"/>
    <!-- Kiswa band lines on front face -->
    <line x1="-60" y1="-30" x2="60" y2="-30" stroke="#fcd34d" stroke-width="0.7" opacity="0.7"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#fcd34d" stroke-width="0.5" opacity="0.5"/>
    <!-- Door arch -->
    <path d="M -15,-70 L -15,-30 A 15,15 0 0,0 15,-30 L 15,-70"
      fill="none" stroke="#fcd34d" stroke-width="0.8"/>
  </g>

  <!-- Tawaf rings - concentric ellipses representing circumambulation -->
  <g transform="translate(300,400)" fill="none" stroke="#fcd34d">
    <ellipse cx="0" cy="0" rx="110" ry="80" stroke-width="0.8" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="150" ry="110" stroke-width="0.7" opacity="0.13"/>
    <ellipse cx="0" cy="0" rx="190" ry="140" stroke-width="0.6" opacity="0.11"/>
    <ellipse cx="0" cy="0" rx="230" ry="170" stroke-width="0.5" opacity="0.09"/>
    <ellipse cx="0" cy="0" rx="270" ry="200" stroke-width="0.4" opacity="0.08"/>
  </g>

  <!-- Pilgrims on tawaf rings - small dots suggesting people -->
  <g fill="#fcd34d" opacity="0.12">
    <!-- Ring 1 dots -->
    <circle cx="410" cy="400" r="1.5"/>
    <circle cx="395" cy="366" r="1.5"/>
    <circle cx="355" cy="332" r="1.5"/>
    <circle cx="300" cy="320" r="1.5"/>
    <circle cx="248" cy="335" r="1.5"/>
    <circle cx="210" cy="370" r="1.5"/>
    <circle cx="200" cy="410" r="1.5"/>
    <circle cx="220" cy="448" r="1.5"/>
    <!-- Ring 2 dots -->
    <circle cx="450" cy="400" r="1.5"/>
    <circle cx="428" cy="352" r="1.5"/>
    <circle cx="375" cy="305" r="1.5"/>
    <circle cx="300" cy="290" r="1.5"/>
    <circle cx="224" cy="308" r="1.5"/>
    <circle cx="175" cy="356" r="1.5"/>
    <circle cx="160" cy="410" r="1.5"/>
    <circle cx="180" cy="460" r="1.5"/>
  </g>

  <!-- Concentric decorative squares in corners -->
  <g opacity="0.12" stroke="#fcd34d" fill="none" stroke-width="0.6">
    <rect x="15" y="15" width="70" height="70"/>
    <rect x="25" y="25" width="50" height="50"/>
    <rect x="35" y="35" width="30" height="30"/>
    <rect x="515" y="15" width="70" height="70"/>
    <rect x="525" y="25" width="50" height="50"/>
    <rect x="535" y="35" width="30" height="30"/>
    <rect x="15" y="715" width="70" height="70"/>
    <rect x="25" y="725" width="50" height="50"/>
    <rect x="35" y="735" width="30" height="30"/>
    <rect x="515" y="715" width="70" height="70"/>
    <rect x="525" y="725" width="50" height="50"/>
    <rect x="535" y="735" width="30" height="30"/>
  </g>

  <!-- Outer border frame -->
  <rect x="20" y="20" width="560" height="760" rx="3" fill="none" stroke="#fcd34d" stroke-width="0.7" opacity="0.18"/>
</svg>
