<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#1a0a0a"/>
  <defs>
    <pattern id="starfieldAmber" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="20" r="0.8" fill="#fbbf24" opacity="0.35"/>
      <circle cx="55" cy="10" r="1" fill="#fbbf24" opacity="0.3"/>
      <circle cx="70" cy="45" r="0.7" fill="#fbbf24" opacity="0.25"/>
      <circle cx="30" cy="60" r="0.9" fill="#fbbf24" opacity="0.3"/>
      <circle cx="65" cy="72" r="0.6" fill="#fbbf24" opacity="0.22"/>
      <circle cx="10" cy="70" r="1.1" fill="#fbbf24" opacity="0.28"/>
      <circle cx="45" cy="38" r="0.5" fill="#fbbf24" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#starfieldAmber)"/>

  <!-- Lantern silhouette - central -->
  <g transform="translate(300,340)" opacity="0.14" stroke="#fbbf24" fill="none">
    <!-- Lantern top cap -->
    <polygon points="0,-115 -15,-95 15,-95" stroke-width="1"/>
    <!-- Lantern chain -->
    <line x1="0" y1="-115" x2="0" y2="-140" stroke-width="0.8"/>
    <!-- Lantern body top arch -->
    <path d="M-40,-95 L-50,-60 L-55,30 L-45,80 L45,80 L55,30 L50,-60 L40,-95 Z"
      stroke-width="1.2"/>
    <!-- Lantern body panels -->
    <line x1="-55" y1="-10" x2="55" y2="-10" stroke-width="0.6" opacity="0.7"/>
    <line x1="-55" y1="30" x2="55" y2="30" stroke-width="0.6" opacity="0.7"/>
    <!-- Panel arches -->
    <path d="M-55,-60 C-20,-80 20,-80 55,-60" stroke-width="0.8"/>
    <!-- Lantern base -->
    <polygon points="-45,80 -35,100 35,100 45,80" stroke-width="1"/>
    <!-- Bottom tassel -->
    <line x1="0" y1="100" x2="0" y2="120" stroke-width="0.8"/>
    <line x1="-8" y1="118" x2="8" y2="118" stroke-width="0.6"/>
    <!-- Decorative star in lantern panel -->
    <polygon points="0,-35 5,-15 25,-10 10,3 14,23 0,14 -14,23 -10,3 -25,-10 -5,-15"
      stroke-width="0.6" opacity="0.8"/>
    <!-- Glow circle -->
    <circle cx="0" cy="-5" r="18" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.5"/>
  </g>

  <!-- Side lanterns smaller -->
  <g transform="translate(100,300)" opacity="0.09" stroke="#fbbf24" fill="none" stroke-width="0.8">
    <line x1="0" y1="-70" x2="0" y2="-85"/>
    <polygon points="0,-70 -10,-60 10,-60" />
    <path d="M-25,-60 L-30,-35 L-32,15 L-26,45 L26,45 L32,15 L30,-35 L25,-60 Z"/>
    <polygon points="-26,45 -20,60 20,60 26,45"/>
  </g>
  <g transform="translate(500,300)" opacity="0.09" stroke="#fbbf24" fill="none" stroke-width="0.8">
    <line x1="0" y1="-70" x2="0" y2="-85"/>
    <polygon points="0,-70 -10,-60 10,-60"/>
    <path d="M-25,-60 L-30,-35 L-32,15 L-26,45 L26,45 L32,15 L30,-35 L25,-60 Z"/>
    <polygon points="-26,45 -20,60 20,60 26,45"/>
  </g>

  <!-- Decorative chain between lanterns -->
  <path d="M 100,240 Q 200,220 300,230 Q 400,220 500,240"
    fill="none" stroke="#fbbf24" stroke-width="0.6" opacity="0.1" stroke-dasharray="3,5"/>

  <!-- Radiating light rays from lantern -->
  <g transform="translate(300,335)" opacity="0.07" stroke="#fbbf24">
    <line x1="0" y1="-5" x2="0" y2="-200" stroke-width="0.5"/>
    <line x1="0" y1="-5" x2="100" y2="-180" stroke-width="0.4"/>
    <line x1="0" y1="-5" x2="-100" y2="-180" stroke-width="0.4"/>
    <line x1="0" y1="-5" x2="170" y2="-130" stroke-width="0.3"/>
    <line x1="0" y1="-5" x2="-170" y2="-130" stroke-width="0.3"/>
    <line x1="0" y1="-5" x2="200" y2="-50" stroke-width="0.3"/>
    <line x1="0" y1="-5" x2="-200" y2="-50" stroke-width="0.3"/>
  </g>

  <!-- Bottom decorative geometric band -->
  <g opacity="0.12" stroke="#fbbf24" fill="none" stroke-width="0.6">
    <line x1="0" y1="740" x2="600" y2="740"/>
    <line x1="0" y1="748" x2="600" y2="748"/>
    <!-- Small diamonds along band -->
    <polygon points="50,744 58,744 54,737 50,744" transform="translate(0,0)"/>
    <polygon points="50,744 58,744 54,751 50,744" transform="translate(0,0)"/>
    <polygon points="50,744 58,744 54,737 50,744" transform="translate(100,0)"/>
    <polygon points="50,744 58,744 54,751 50,744" transform="translate(100,0)"/>
    <polygon points="50,744 58,744 54,737 50,744" transform="translate(200,0)"/>
    <polygon points="50,744 58,744 54,751 50,744" transform="translate(200,0)"/>
    <polygon points="50,744 58,744 54,737 50,744" transform="translate(300,0)"/>
    <polygon points="50,744 58,744 54,751 50,744" transform="translate(300,0)"/>
    <polygon points="50,744 58,744 54,737 50,744" transform="translate(400,0)"/>
    <polygon points="50,744 58,744 54,751 50,744" transform="translate(400,0)"/>
  </g>
</svg>
