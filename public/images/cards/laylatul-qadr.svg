<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#0d0a1a"/>
  <defs>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c6fcd" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c6fcd" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Central glow -->
  <ellipse cx="300" cy="400" rx="280" ry="360" fill="url(#glowCenter)"/>

  <!-- Radiating concentric rings - key motif -->
  <g transform="translate(300,400)" fill="none" stroke="#7c6fcd">
    <circle cx="0" cy="0" r="30" stroke-width="0.9" opacity="0.2"/>
    <circle cx="0" cy="0" r="55" stroke-width="0.8" opacity="0.18"/>
    <circle cx="0" cy="0" r="80" stroke-width="0.7" opacity="0.16"/>
    <circle cx="0" cy="0" r="108" stroke-width="0.7" opacity="0.15"/>
    <circle cx="0" cy="0" r="138" stroke-width="0.6" opacity="0.13"/>
    <circle cx="0" cy="0" r="170" stroke-width="0.6" opacity="0.12"/>
    <circle cx="0" cy="0" r="205" stroke-width="0.5" opacity="0.11"/>
    <circle cx="0" cy="0" r="243" stroke-width="0.5" opacity="0.1"/>
    <circle cx="0" cy="0" r="283" stroke-width="0.4" opacity="0.09"/>
    <circle cx="0" cy="0" r="326" stroke-width="0.4" opacity="0.08"/>
    <circle cx="0" cy="0" r="371" stroke-width="0.3" opacity="0.07"/>
    <circle cx="0" cy="0" r="420" stroke-width="0.3" opacity="0.06"/>
  </g>

  <!-- Star field -->
  <g fill="#7c6fcd" opacity="0.35">
    <circle cx="50" cy="80" r="1.2"/>
    <circle cx="180" cy="50" r="0.9"/>
    <circle cx="380" cy="30" r="1.1"/>
    <circle cx="530" cy="90" r="0.8"/>
    <circle cx="80" cy="200" r="0.7"/>
    <circle cx="550" cy="180" r="1"/>
    <circle cx="120" cy="350" r="0.8"/>
    <circle cx="480" cy="300" r="1.1"/>
    <circle cx="40" cy="500" r="0.9"/>
    <circle cx="560" cy="450" r="0.7"/>
    <circle cx="200" cy="650" r="1"/>
    <circle cx="400" cy="700" r="0.8"/>
    <circle cx="100" cy="720" r="0.9"/>
    <circle cx="500" cy="680" r="1.2"/>
    <circle cx="290" cy="760" r="0.7"/>
    <circle cx="330" cy="120" r="0.6"/>
    <circle cx="460" cy="500" r="0.8"/>
    <circle cx="150" cy="480" r="0.9"/>
  </g>

  <!-- 4-pointed star shapes -->
  <g fill="none" stroke="#7c6fcd" opacity="0.18" stroke-width="0.7">
    <polygon points="300,250 303,262 315,265 303,268 300,280 297,268 285,265 297,262"/>
    <polygon points="120,180 123,191 135,194 123,197 120,209 117,197 105,194 117,191"/>
    <polygon points="480,220 483,231 495,234 483,237 480,249 477,237 465,234 477,231"/>
    <polygon points="80,580 83,591 95,594 83,597 80,609 77,597 65,594 77,591"/>
    <polygon points="520,600 523,611 535,614 523,617 520,629 517,617 505,614 517,611"/>
    <polygon points="200,700 203,710 213,712 203,714 200,724 197,714 187,712 197,710"/>
    <polygon points="400,680 403,690 413,692 403,694 400,704 397,694 387,692 397,690"/>
  </g>

  <!-- Radial rays from center -->
  <g transform="translate(300,400)" opacity="0.06" stroke="#7c6fcd">
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6"/>
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6" transform="rotate(30)"/>
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6" transform="rotate(60)"/>
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6" transform="rotate(90)"/>
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6" transform="rotate(120)"/>
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6" transform="rotate(150)"/>
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6" transform="rotate(180)"/>
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6" transform="rotate(210)"/>
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6" transform="rotate(240)"/>
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6" transform="rotate(270)"/>
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6" transform="rotate(300)"/>
    <line x1="0" y1="-420" x2="0" y2="-30" stroke-width="0.6" transform="rotate(330)"/>
  </g>

  <!-- Central 8-pointed star -->
  <g transform="translate(300,400)" opacity="0.14" fill="none" stroke="#7c6fcd">
    <polygon points="0,-28 8,-8 28,0 8,8 0,28 -8,8 -28,0 -8,-8"
      stroke-width="1" transform="rotate(22.5)"/>
    <circle cx="0" cy="0" r="12" stroke-width="0.7"/>
  </g>
</svg>
