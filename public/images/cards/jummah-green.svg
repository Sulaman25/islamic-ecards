<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#0d2b0d"/>
  <defs>
    <!-- 6-fold geometric star lattice -->
    <pattern id="sixFold" x="0" y="0" width="100" height="86.6" patternUnits="userSpaceOnUse">
      <!-- Hexagon -->
      <polygon points="50,3 97,28 97,78 50,103 3,78 3,28"
        fill="none" stroke="#4ade80" stroke-width="0.7" opacity="0.38"/>
      <!-- Inner hexagon rotated -->
      <polygon points="50,18 80,35 80,68 50,85 20,68 20,35"
        fill="none" stroke="#4ade80" stroke-width="0.5" opacity="0.28"/>
      <!-- 6-pointed star -->
      <polygon points="50,10 57,29 76,29 62,41 67,60 50,49 33,60 38,41 24,29 43,29"
        fill="none" stroke="#4ade80" stroke-width="0.5" opacity="0.22"/>
      <!-- Center -->
      <circle cx="50" cy="43" r="3" fill="none" stroke="#4ade80" stroke-width="0.4" opacity="0.3"/>
      <!-- Spokes -->
      <line x1="50" y1="3" x2="50" y2="18" stroke="#4ade80" stroke-width="0.3" opacity="0.18"/>
      <line x1="97" y1="28" x2="80" y2="35" stroke="#4ade80" stroke-width="0.3" opacity="0.18"/>
      <line x1="97" y1="78" x2="80" y2="68" stroke="#4ade80" stroke-width="0.3" opacity="0.18"/>
      <line x1="50" y1="103" x2="50" y2="85" stroke="#4ade80" stroke-width="0.3" opacity="0.18"/>
      <line x1="3" y1="78" x2="20" y2="68" stroke="#4ade80" stroke-width="0.3" opacity="0.18"/>
      <line x1="3" y1="28" x2="20" y2="35" stroke="#4ade80" stroke-width="0.3" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#sixFold)"/>

  <!-- Central large 6-fold star -->
  <g transform="translate(300,400)" opacity="0.13">
    <!-- Outer 12-pointed star -->
    <polygon points="0,-170 24,-85 85,-145 51,-56 145,-85 85,-24 170,0 85,24 145,85 56,51 85,145 24,85 0,170 -24,85 -85,145 -51,56 -145,85 -85,24 -170,0 -85,-24 -145,-85 -56,-51 -85,-145 -24,-85"
      fill="none" stroke="#4ade80" stroke-width="1.2"/>
    <!-- Inner hexagon -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"
      fill="none" stroke="#4ade80" stroke-width="1"/>
    <!-- 6-spoked wheel -->
    <line x1="0" y1="-120" x2="0" y2="120" stroke="#4ade80" stroke-width="0.6" opacity="0.5"/>
    <line x1="-104" y1="-60" x2="104" y2="60" stroke="#4ade80" stroke-width="0.6" opacity="0.5"/>
    <line x1="104" y1="-60" x2="-104" y2="60" stroke="#4ade80" stroke-width="0.6" opacity="0.5"/>
    <!-- Concentric rings -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#4ade80" stroke-width="0.7"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#4ade80" stroke-width="0.5" stroke-dasharray="3,6"/>
    <circle cx="0" cy="0" r="175" fill="none" stroke="#4ade80" stroke-width="0.4" stroke-dasharray="2,8"/>
  </g>

  <!-- Decorative border with arches -->
  <g opacity="0.12" stroke="#4ade80" fill="none" stroke-width="0.7">
    <rect x="20" y="20" width="560" height="760" rx="4"/>
  </g>
  <!-- Top arch repeat -->
  <g opacity="0.1" stroke="#4ade80" fill="none" stroke-width="0.5">
    <path d="M20,60 A20,20 0 0,1 60,60"/>
    <path d="M60,60 A20,20 0 0,1 100,60"/>
    <path d="M100,60 A20,20 0 0,1 140,60"/>
    <path d="M140,60 A20,20 0 0,1 180,60"/>
    <path d="M180,60 A20,20 0 0,1 220,60"/>
    <path d="M220,60 A20,20 0 0,1 260,60"/>
    <path d="M260,60 A20,20 0 0,1 300,60"/>
    <path d="M300,60 A20,20 0 0,1 340,60"/>
    <path d="M340,60 A20,20 0 0,1 380,60"/>
    <path d="M380,60 A20,20 0 0,1 420,60"/>
    <path d="M420,60 A20,20 0 0,1 460,60"/>
    <path d="M460,60 A20,20 0 0,1 500,60"/>
    <path d="M500,60 A20,20 0 0,1 540,60"/>
    <path d="M540,60 A20,20 0 0,1 580,60"/>
    <line x1="20" y1="60" x2="580" y2="60"/>
  </g>
</svg>
