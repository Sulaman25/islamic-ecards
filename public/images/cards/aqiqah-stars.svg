<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#1a0a2e"/>
  <defs>
    <pattern id="softStars" x="0" y="0" width="90" height="90" patternUnits="userSpaceOnUse">
      <!-- 4-pointed star -->
      <polygon points="45,12 49,41 78,45 49,49 45,78 41,49 12,45 41,41"
        fill="none" stroke="#c4b5fd" stroke-width="0.6" opacity="0.35"/>
      <!-- Small dots -->
      <circle cx="15" cy="15" r="1" fill="#c4b5fd" opacity="0.3"/>
      <circle cx="75" cy="20" r="0.8" fill="#c4b5fd" opacity="0.25"/>
      <circle cx="20" cy="72" r="1" fill="#c4b5fd" opacity="0.28"/>
      <circle cx="72" cy="68" r="0.8" fill="#c4b5fd" opacity="0.22"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#softStars)"/>

  <!-- Large crescent moon - gentle and welcoming (for baby) -->
  <g transform="translate(300,280)" opacity="0.15">
    <circle cx="0" cy="0" r="110" fill="none" stroke="#c4b5fd" stroke-width="1.3"/>
    <circle cx="28" cy="-15" r="93" fill="#1a0a2e"/>
    <path d="M-78,-78 A 110,110 0 1,1 -78,78 A 93,93 0 1,0 -78,-78 Z"
      fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
  </g>

  <!-- Scattered 4-pointed stars of varying sizes -->
  <g fill="none" stroke="#c4b5fd" opacity="0.18">
    <!-- Large star top-left -->
    <polygon points="80,120 85,145 110,150 85,155 80,180 75,155 50,150 75,145"
      stroke-width="0.9"/>
    <!-- Medium stars -->
    <polygon points="500,80 503,95 518,98 503,101 500,116 497,101 482,98 497,95"
      stroke-width="0.7"/>
    <polygon points="150,600 153,615 168,618 153,621 150,636 147,621 132,618 147,615"
      stroke-width="0.7"/>
    <polygon points="460,550 463,565 478,568 463,571 460,586 457,571 442,568 457,565"
      stroke-width="0.8"/>
    <!-- Small stars -->
    <polygon points="50,400 52,409 61,411 52,413 50,422 48,413 39,411 48,409"
      stroke-width="0.6"/>
    <polygon points="540,350 542,359 551,361 542,363 540,372 538,363 529,361 538,359"
      stroke-width="0.6"/>
    <polygon points="200,730 202,737 209,738 202,739 200,746 198,739 191,738 198,737"
      stroke-width="0.5"/>
    <polygon points="400,700 402,707 409,708 402,709 400,716 398,709 391,708 398,707"
      stroke-width="0.5"/>
    <polygon points="300,680 302,689 311,691 302,693 300,702 298,693 289,691 298,689"
      stroke-width="0.6"/>
  </g>

  <!-- Soft radiating rings from center - like a baby's gentle aura -->
  <g transform="translate(300,400)" opacity="0.08" fill="none" stroke="#c4b5fd">
    <circle cx="0" cy="0" r="120" stroke-width="0.6" stroke-dasharray="3,8"/>
    <circle cx="0" cy="0" r="180" stroke-width="0.5" stroke-dasharray="2,10"/>
    <circle cx="0" cy="0" r="250" stroke-width="0.4" stroke-dasharray="1,12"/>
  </g>

  <!-- Tiny twinkling dots scattered -->
  <g fill="#c4b5fd" opacity="0.2">
    <circle cx="100" cy="50" r="1.2"/>
    <circle cx="250" cy="80" r="0.8"/>
    <circle cx="400" cy="40" r="1"/>
    <circle cx="550" cy="100" r="0.9"/>
    <circle cx="30" cy="200" r="0.7"/>
    <circle cx="570" cy="250" r="1.1"/>
    <circle cx="60" cy="500" r="0.8"/>
    <circle cx="520" cy="480" r="0.9"/>
    <circle cx="140" cy="750" r="1"/>
    <circle cx="480" cy="760" r="0.8"/>
    <circle cx="330" cy="760" r="1.1"/>
  </g>

  <!-- Gentle border -->
  <rect x="20" y="20" width="560" height="760" rx="8" fill="none" stroke="#c4b5fd" stroke-width="0.6" opacity="0.13"/>
</svg>
