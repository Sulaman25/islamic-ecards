<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#1a2e0a"/>
  <defs>
    <!-- 6-pointed star lattice tile -->
    <pattern id="starLattice" x="0" y="0" width="90" height="78" patternUnits="userSpaceOnUse">
      <!-- Hexagonal star (Star of David type) -->
      <polygon points="45,3 55,21 75,21 65,39 75,57 55,57 45,75 35,57 15,57 25,39 15,21 35,21"
        fill="none" stroke="#6ee7b7" stroke-width="0.7" opacity="0.45"/>
      <!-- Inner hexagon -->
      <polygon points="45,18 54,27 54,45 45,54 36,45 36,27"
        fill="none" stroke="#6ee7b7" stroke-width="0.5" opacity="0.3"/>
      <!-- Connecting lines to adjacent tiles -->
      <line x1="45" y1="3" x2="45" y2="0" stroke="#6ee7b7" stroke-width="0.4" opacity="0.2"/>
      <line x1="75" y1="21" x2="90" y2="21" stroke="#6ee7b7" stroke-width="0.4" opacity="0.2"/>
      <line x1="75" y1="57" x2="90" y2="57" stroke="#6ee7b7" stroke-width="0.4" opacity="0.2"/>
      <line x1="0" y1="21" x2="15" y2="21" stroke="#6ee7b7" stroke-width="0.4" opacity="0.2"/>
      <line x1="0" y1="57" x2="15" y2="57" stroke="#6ee7b7" stroke-width="0.4" opacity="0.2"/>
      <line x1="45" y1="75" x2="45" y2="78" stroke="#6ee7b7" stroke-width="0.4" opacity="0.2"/>
      <!-- Center dot -->
      <circle cx="45" cy="39" r="2" fill="none" stroke="#6ee7b7" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#starLattice)"/>

  <!-- Large central 6-pointed star -->
  <g transform="translate(300,400)" opacity="0.14">
    <polygon points="0,-150 43,-75 129,-75 86,0 129,75 43,75 0,150 -43,75 -129,75 -86,0 -129,-75 -43,-75"
      fill="none" stroke="#6ee7b7" stroke-width="1.5"/>
    <polygon points="0,-100 29,-50 86,-50 57,0 86,50 29,50 0,100 -29,50 -86,50 -57,0 -86,-50 -29,-50"
      fill="none" stroke="#6ee7b7" stroke-width="1"/>
    <polygon points="0,-55 16,-28 47,-28 31,0 47,28 16,28 0,55 -16,28 -47,28 -31,0 -47,-28 -16,-28"
      fill="none" stroke="#6ee7b7" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="175" fill="none" stroke="#6ee7b7" stroke-width="0.6" stroke-dasharray="4,8"/>
    <circle cx="0" cy="0" r="220" fill="none" stroke="#6ee7b7" stroke-width="0.4" stroke-dasharray="2,12"/>
  </g>

  <!-- Decorative border -->
  <g opacity="0.15" stroke="#6ee7b7" fill="none">
    <rect x="25" y="25" width="550" height="750" rx="4" stroke-width="0.8"/>
    <rect x="35" y="35" width="530" height="730" rx="2" stroke-width="0.4" stroke-dasharray="4,6"/>
  </g>

  <!-- Corner hex flowers -->
  <g opacity="0.12" stroke="#6ee7b7" fill="none" stroke-width="0.8">
    <polygon points="50,10 56,21 69,21 63,32 69,43 56,43 50,54 44,43 31,43 37,32 31,21 44,21" transform="translate(0,0)"/>
    <polygon points="50,10 56,21 69,21 63,32 69,43 56,43 50,54 44,43 31,43 37,32 31,21 44,21" transform="translate(500,0)"/>
    <polygon points="50,10 56,21 69,21 63,32 69,43 56,43 50,54 44,43 31,43 37,32 31,21 44,21" transform="translate(0,718)"/>
    <polygon points="50,10 56,21 69,21 63,32 69,43 56,43 50,54 44,43 31,43 37,32 31,21 44,21" transform="translate(500,718)"/>
  </g>
</svg>
