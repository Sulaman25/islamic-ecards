<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#0f1a40"/>
  <defs>
    <!-- Lattice of dots -->
    <pattern id="dotLattice" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#818cf8" opacity="0.25"/>
      <circle cx="0" cy="0" r="0.7" fill="#818cf8" opacity="0.18"/>
      <circle cx="40" cy="0" r="0.7" fill="#818cf8" opacity="0.18"/>
      <circle cx="0" cy="40" r="0.7" fill="#818cf8" opacity="0.18"/>
      <circle cx="40" cy="40" r="0.7" fill="#818cf8" opacity="0.18"/>
      <!-- Light cross connector at each node -->
      <line x1="0" y1="0" x2="40" y2="0" stroke="#818cf8" stroke-width="0.2" opacity="0.08"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="#818cf8" stroke-width="0.2" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#dotLattice)"/>

  <!-- Ascending beams from bottom - suggesting graduation achievement -->
  <g opacity="0.1" stroke="#818cf8">
    <!-- Central ascending column -->
    <line x1="300" y1="800" x2="300" y2="0" stroke-width="3" opacity="0.07"/>
    <!-- Flanking beams slightly angled -->
    <line x1="280" y1="800" x2="295" y2="0" stroke-width="1.5" opacity="0.06"/>
    <line x1="320" y1="800" x2="305" y2="0" stroke-width="1.5" opacity="0.06"/>
    <line x1="250" y1="800" x2="285" y2="0" stroke-width="1" opacity="0.05"/>
    <line x1="350" y1="800" x2="315" y2="0" stroke-width="1" opacity="0.05"/>
    <line x1="200" y1="800" x2="270" y2="0" stroke-width="0.7" opacity="0.04"/>
    <line x1="400" y1="800" x2="330" y2="0" stroke-width="0.7" opacity="0.04"/>
    <line x1="140" y1="800" x2="255" y2="0" stroke-width="0.5" opacity="0.04"/>
    <line x1="460" y1="800" x2="345" y2="0" stroke-width="0.5" opacity="0.04"/>
    <line x1="80" y1="800" x2="240" y2="0" stroke-width="0.4" opacity="0.03"/>
    <line x1="520" y1="800" x2="360" y2="0" stroke-width="0.4" opacity="0.03"/>
  </g>

  <!-- Horizontal dotted rows suggesting knowledge levels / hierarchy -->
  <g opacity="0.1" stroke="#818cf8" fill="none">
    <!-- Dotted row bands -->
    <line x1="0" y1="200" x2="600" y2="200" stroke-width="0.5" stroke-dasharray="2,8"/>
    <line x1="0" y1="350" x2="600" y2="350" stroke-width="0.5" stroke-dasharray="2,8"/>
    <line x1="0" y1="500" x2="600" y2="500" stroke-width="0.5" stroke-dasharray="2,8"/>
    <line x1="0" y1="650" x2="600" y2="650" stroke-width="0.5" stroke-dasharray="2,8"/>
  </g>

  <!-- Central medallion at top of beams -->
  <g transform="translate(300,200)" opacity="0.14" fill="none" stroke="#818cf8">
    <!-- 8-pointed star -->
    <polygon points="0,-60 17,-17 60,0 17,17 0,60 -17,17 -60,0 -17,-17"
      stroke-width="1.2" transform="rotate(22.5)"/>
    <circle cx="0" cy="0" r="30" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="75" stroke-width="0.5" stroke-dasharray="3,5"/>
    <circle cx="0" cy="0" r="105" stroke-width="0.4" stroke-dasharray="2,7"/>
    <!-- Inner small star -->
    <polygon points="0,-20 6,-6 20,0 6,6 0,20 -6,6 -20,0 -6,-6"
      stroke-width="0.7" transform="rotate(22.5)"/>
  </g>

  <!-- Decorative 4-pointed stars as milestones on the beam -->
  <g fill="none" stroke="#818cf8" opacity="0.16" stroke-width="0.8">
    <polygon points="300,330 304,342 316,346 304,350 300,362 296,350 284,346 296,342"/>
    <polygon points="300,480 304,492 316,496 304,500 300,512 296,500 284,496 296,492"/>
    <polygon points="300,620 304,632 316,636 304,640 300,652 296,640 284,636 296,632"/>
  </g>

  <!-- Side column ornament lines -->
  <g opacity="0.12" stroke="#818cf8" fill="none" stroke-width="0.6">
    <line x1="60" y1="0" x2="60" y2="800"/>
    <line x1="540" y1="0" x2="540" y2="800"/>
    <!-- Tick marks on side columns -->
    <line x1="55" y1="200" x2="65" y2="200" stroke-width="1"/>
    <line x1="55" y1="350" x2="65" y2="350" stroke-width="1"/>
    <line x1="55" y1="500" x2="65" y2="500" stroke-width="1"/>
    <line x1="55" y1="650" x2="65" y2="650" stroke-width="1"/>
    <line x1="535" y1="200" x2="545" y2="200" stroke-width="1"/>
    <line x1="535" y1="350" x2="545" y2="350" stroke-width="1"/>
    <line x1="535" y1="500" x2="545" y2="500" stroke-width="1"/>
    <line x1="535" y1="650" x2="545" y2="650" stroke-width="1"/>
  </g>

  <!-- Border -->
  <rect x="20" y="20" width="560" height="760" rx="4" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.15"/>
</svg>
