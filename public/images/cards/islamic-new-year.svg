<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#051318"/>
  <defs>
    <pattern id="tealDots" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="0.8" fill="#0ea5e9" opacity="0.2"/>
      <circle cx="0" cy="0" r="0.5" fill="#0ea5e9" opacity="0.15"/>
      <circle cx="50" cy="0" r="0.5" fill="#0ea5e9" opacity="0.15"/>
      <circle cx="0" cy="50" r="0.5" fill="#0ea5e9" opacity="0.15"/>
      <circle cx="50" cy="50" r="0.5" fill="#0ea5e9" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#tealDots)"/>

  <!-- Spiral rings - new cycle / new year motif -->
  <g transform="translate(300,400)" fill="none" stroke="#0ea5e9">
    <!-- Spiral approximated with arcs of increasing radius -->
    <path d="M 0,0 A 30,30 0 0,1 30,0 A 35,35 0 0,1 -35,0 A 40,40 0 0,1 40,0"
      stroke-width="0.7" opacity="0.2"/>
    <!-- Concentric circles suggesting spiral -->
    <circle cx="0" cy="0" r="25" stroke-width="0.8" opacity="0.18"/>
    <circle cx="0" cy="0" r="50" stroke-width="0.7" opacity="0.17"/>
    <circle cx="0" cy="0" r="78" stroke-width="0.7" opacity="0.16"/>
    <circle cx="0" cy="0" r="108" stroke-width="0.6" opacity="0.15"/>
    <circle cx="0" cy="0" r="140" stroke-width="0.6" opacity="0.14"/>
    <circle cx="0" cy="0" r="175" stroke-width="0.5" opacity="0.13"/>
    <circle cx="0" cy="0" r="212" stroke-width="0.5" opacity="0.12"/>
    <circle cx="0" cy="0" r="252" stroke-width="0.4" opacity="0.1"/>
    <circle cx="0" cy="0" r="295" stroke-width="0.4" opacity="0.09"/>
  </g>

  <!-- Crescent-star motif - Islamic New Year symbol -->
  <g transform="translate(300,280)" opacity="0.16">
    <!-- Crescent -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#0ea5e9" stroke-width="1.3"/>
    <circle cx="22" cy="-12" r="67" fill="#051318"/>
    <path d="M-57,-57 A 80,80 0 1,1 -57,57 A 67,67 0 1,0 -57,-57 Z"
      fill="none" stroke="#0ea5e9" stroke-width="1.2"/>
    <!-- Star beside crescent -->
    <polygon points="68,10 72,25 87,29 72,33 68,48 64,33 49,29 64,25"
      fill="none" stroke="#0ea5e9" stroke-width="0.9" opacity="0.9"/>
    <!-- Small stars -->
    <circle cx="-30" cy="-80" r="1.5" fill="#0ea5e9" opacity="0.6"/>
    <circle cx="40" cy="-70" r="1" fill="#0ea5e9" opacity="0.5"/>
    <circle cx="-60" cy="-20" r="1.2" fill="#0ea5e9" opacity="0.55"/>
  </g>

  <!-- Radial spokes suggesting new beginning / dawn -->
  <g transform="translate(300,400)" opacity="0.07" stroke="#0ea5e9">
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(15)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(30)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(45)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(60)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(75)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(90)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(105)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(120)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(135)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(150)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(165)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(180)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(195)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(210)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(225)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(240)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(255)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(270)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(285)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(300)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(315)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(330)"/>
    <line x1="0" y1="-300" x2="0" y2="-26" stroke-width="0.8" transform="rotate(345)"/>
  </g>

  <!-- Scattered stars -->
  <g fill="#0ea5e9" opacity="0.3">
    <circle cx="60" cy="80" r="1.1"/>
    <circle cx="160" cy="40" r="0.9"/>
    <circle cx="480" cy="60" r="1"/>
    <circle cx="550" cy="150" r="0.8"/>
    <circle cx="30" cy="300" r="0.9"/>
    <circle cx="570" cy="350" r="1.1"/>
    <circle cx="80" cy="550" r="0.8"/>
    <circle cx="520" cy="500" r="1"/>
    <circle cx="150" cy="700" r="0.9"/>
    <circle cx="450" cy="720" r="1"/>
    <circle cx="300" cy="750" r="0.7"/>
  </g>

  <!-- Border teal -->
  <rect x="18" y="18" width="564" height="764" rx="5" fill="none" stroke="#0ea5e9" stroke-width="0.7" opacity="0.16"/>
  <rect x="26" y="26" width="548" height="748" rx="3" fill="none" stroke="#0ea5e9" stroke-width="0.3" stroke-dasharray="3,7" opacity="0.1"/>
</svg>
