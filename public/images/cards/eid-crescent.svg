<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#0f1f3d"/>
  <defs>
    <pattern id="starfield" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <!-- 4-pointed star -->
      <polygon points="20,10 22,18 30,20 22,22 20,30 18,22 10,20 18,18"
        fill="none" stroke="#93c5fd" stroke-width="0.7" opacity="0.55"/>
      <!-- Small dot stars -->
      <circle cx="70" cy="30" r="1" fill="#93c5fd" opacity="0.45"/>
      <circle cx="90" cy="70" r="1.2" fill="#93c5fd" opacity="0.4"/>
      <circle cx="45" cy="85" r="0.8" fill="#93c5fd" opacity="0.35"/>
      <circle cx="100" cy="10" r="1" fill="#93c5fd" opacity="0.3"/>
      <circle cx="10" cy="60" r="0.9" fill="#93c5fd" opacity="0.38"/>
      <circle cx="60" cy="55" r="0.6" fill="#93c5fd" opacity="0.25"/>
      <!-- 4-pointed tiny star -->
      <polygon points="80,55 81,59 85,60 81,61 80,65 79,61 75,60 79,59"
        fill="none" stroke="#93c5fd" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>
  <!-- Star field background -->
  <rect width="600" height="800" fill="url(#starfield)"/>

  <!-- Large central crescent -->
  <g transform="translate(300,300)" opacity="0.14">
    <circle cx="0" cy="0" r="130" fill="none" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="30" cy="-15" r="110" fill="#0f1f3d"/>
    <!-- Crescent outline only -->
    <path d="M 0,-130 A 130,130 0 1,1 0,130 A 110,110 0 1,0 0,-130 Z"
      fill="none" stroke="#93c5fd" stroke-width="1.2" opacity="0.8"/>
  </g>

  <!-- Constellation-style connecting lines -->
  <g opacity="0.1" stroke="#93c5fd" stroke-width="0.5">
    <line x1="80" y1="120" x2="160" y2="200"/>
    <line x1="160" y1="200" x2="300" y2="180"/>
    <line x1="300" y1="180" x2="440" y2="220"/>
    <line x1="440" y1="220" x2="520" y2="140"/>
    <line x1="200" y1="500" x2="300" y2="520"/>
    <line x1="300" y1="520" x2="400" y2="480"/>
    <line x1="100" y1="650" x2="200" y2="680"/>
    <line x1="200" y1="680" x2="350" y2="660"/>
    <line x1="350" y1="660" x2="480" y2="700"/>
  </g>

  <!-- Large crescent at top -->
  <g transform="translate(300,110)" opacity="0.13">
    <path d="M-45,-55 A 70,70 0 1,1 45,-55 A 55,55 0 1,0 -45,-55 Z"
      fill="none" stroke="#93c5fd" stroke-width="1.2"/>
    <!-- Star beside crescent -->
    <polygon points="70,-30 73,-20 83,-17 73,-14 70,-4 67,-14 57,-17 67,-20"
      fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.9"/>
  </g>

  <!-- Scattered larger stars -->
  <g fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.18">
    <polygon points="80,300 83,310 93,313 83,316 80,326 77,316 67,313 77,310" transform="scale(1.5) translate(-26,130)"/>
    <polygon points="80,300 83,310 93,313 83,316 80,326 77,316 67,313 77,310" transform="translate(430,580) scale(1.2)"/>
    <polygon points="80,300 83,310 93,313 83,316 80,326 77,316 67,313 77,310" transform="translate(50,600) scale(0.9)"/>
  </g>

  <!-- Bottom crescents small -->
  <g opacity="0.1">
    <path d="M 520,700 A 30,30 0 1,1 560,700 A 23,23 0 1,0 520,700 Z"
      fill="none" stroke="#93c5fd" stroke-width="1"/>
    <path d="M 30,720 A 25,25 0 1,1 65,720 A 19,19 0 1,0 30,720 Z"
      fill="none" stroke="#93c5fd" stroke-width="1"/>
  </g>

  <!-- Concentric circle rings behind crescent -->
  <g transform="translate(300,300)" opacity="0.07" fill="none" stroke="#93c5fd">
    <circle cx="0" cy="0" r="160" stroke-width="0.6" stroke-dasharray="3,9"/>
    <circle cx="0" cy="0" r="200" stroke-width="0.5" stroke-dasharray="2,12"/>
    <circle cx="0" cy="0" r="250" stroke-width="0.4" stroke-dasharray="2,14"/>
  </g>
</svg>
