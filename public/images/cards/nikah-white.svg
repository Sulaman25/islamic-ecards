<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <rect width="600" height="800" fill="#f5f0e8"/>
  <defs>
    <!-- Delicate floral lattice - LIGHT background, darker taupe strokes -->
    <pattern id="floralLattice" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <!-- Diamond grid -->
      <polygon points="40,4 76,40 40,76 4,40"
        fill="none" stroke="#92400e" stroke-width="0.5" opacity="0.12"/>
      <!-- Inner diamond -->
      <polygon points="40,20 60,40 40,60 20,40"
        fill="none" stroke="#92400e" stroke-width="0.4" opacity="0.1"/>
      <!-- Floral at center -->
      <circle cx="40" cy="40" r="8" fill="none" stroke="#92400e" stroke-width="0.4" opacity="0.1"/>
      <circle cx="40" cy="40" r="4" fill="none" stroke="#92400e" stroke-width="0.35" opacity="0.09"/>
      <!-- Petal lines -->
      <line x1="40" y1="32" x2="40" y2="20" stroke="#92400e" stroke-width="0.3" opacity="0.08"/>
      <line x1="40" y1="48" x2="40" y2="60" stroke="#92400e" stroke-width="0.3" opacity="0.08"/>
      <line x1="32" y1="40" x2="20" y2="40" stroke="#92400e" stroke-width="0.3" opacity="0.08"/>
      <line x1="48" y1="40" x2="60" y2="40" stroke="#92400e" stroke-width="0.3" opacity="0.08"/>
      <!-- Diagonal petals -->
      <line x1="34" y1="34" x2="24" y2="24" stroke="#92400e" stroke-width="0.25" opacity="0.07"/>
      <line x1="46" y1="34" x2="56" y2="24" stroke="#92400e" stroke-width="0.25" opacity="0.07"/>
      <line x1="34" y1="46" x2="24" y2="56" stroke="#92400e" stroke-width="0.25" opacity="0.07"/>
      <line x1="46" y1="46" x2="56" y2="56" stroke="#92400e" stroke-width="0.25" opacity="0.07"/>
      <!-- Corner mini flowers -->
      <circle cx="4" cy="4" r="3" fill="none" stroke="#92400e" stroke-width="0.3" opacity="0.08"/>
      <circle cx="76" cy="4" r="3" fill="none" stroke="#92400e" stroke-width="0.3" opacity="0.08"/>
      <circle cx="4" cy="76" r="3" fill="none" stroke="#92400e" stroke-width="0.3" opacity="0.08"/>
      <circle cx="76" cy="76" r="3" fill="none" stroke="#92400e" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#floralLattice)"/>

  <!-- Central delicate mandala -->
  <g transform="translate(300,400)" opacity="0.1">
    <g stroke="#92400e" fill="none">
      <!-- 12 thin petals -->
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(0)"/>
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(30)"/>
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(60)"/>
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(90)"/>
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(120)"/>
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(150)"/>
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(180)"/>
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(210)"/>
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(240)"/>
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(270)"/>
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(300)"/>
      <ellipse cx="0" cy="-65" rx="12" ry="30" stroke-width="0.7" transform="rotate(330)"/>
      <!-- Rings -->
      <circle cx="0" cy="0" r="30" stroke-width="0.6"/>
      <circle cx="0" cy="0" r="48" stroke-width="0.4" stroke-dasharray="2,4"/>
      <circle cx="0" cy="0" r="90" stroke-width="0.4" stroke-dasharray="2,6"/>
      <circle cx="0" cy="0" r="140" stroke-width="0.3" stroke-dasharray="1,8"/>
    </g>
  </g>

  <!-- Elegant thin border -->
  <g opacity="0.13" stroke="#92400e" fill="none">
    <rect x="18" y="18" width="564" height="764" rx="6" stroke-width="0.6"/>
    <rect x="26" y="26" width="548" height="748" rx="4" stroke-width="0.4"/>
    <rect x="34" y="34" width="532" height="732" rx="2" stroke-width="0.3" stroke-dasharray="3,7"/>
  </g>

  <!-- Corner floral sprigs -->
  <g opacity="0.11" stroke="#92400e" fill="none" stroke-width="0.6">
    <!-- Top-left sprig -->
    <path d="M50,50 C55,40 65,38 70,45 C65,52 55,50 50,50 Z"/>
    <path d="M50,50 C40,45 38,35 45,30 C52,35 50,45 50,50 Z"/>
    <circle cx="50" cy="50" r="4"/>
    <!-- Top-right sprig -->
    <path d="M550,50 C545,40 535,38 530,45 C535,52 545,50 550,50 Z"/>
    <path d="M550,50 C560,45 562,35 555,30 C548,35 550,45 550,50 Z"/>
    <circle cx="550" cy="50" r="4"/>
    <!-- Bottom-left sprig -->
    <path d="M50,750 C55,760 65,762 70,755 C65,748 55,750 50,750 Z"/>
    <path d="M50,750 C40,755 38,765 45,770 C52,765 50,755 50,750 Z"/>
    <circle cx="50" cy="750" r="4"/>
    <!-- Bottom-right sprig -->
    <path d="M550,750 C545,760 535,762 530,755 C535,748 545,750 550,750 Z"/>
    <path d="M550,750 C560,755 562,765 555,770 C548,765 550,755 550,750 Z"/>
    <circle cx="550" cy="750" r="4"/>
  </g>
</svg>
